# Pre-provisioned local PersistentVolume (required by kubernetes.io/no-provisioner).
# Before applying:
#   1. Run: kubectl get nodes   → copy your node name
#   2. Replace <YOUR-NODE-NAME> below with your actual node name
#   3. Ensure /mnt/data/mysql exists on that node:
#         kubectl exec -it <any-pod> -- mkdir -p /mnt/data/mysql
#      OR:  ssh <node>  &&  sudo mkdir -p /mnt/data/mysql
apiVersion: v1
kind: PersistentVolume
metadata:
  name: mysql-pv
  labels:
    app: mysql
spec:
  capacity:
    storage: 5Gi
  accessModes:
    - ReadWriteOnce
  persistentVolumeReclaimPolicy: Retain
  storageClassName: local-storage
  local:
    path: /mnt/data/mysql
  nodeAffinity:
    required:
      nodeSelectorTerms:
        - matchExpressions:
            - key: kubernetes.io/hostname
              operator: In
              values:
                - <YOUR-NODE-NAME>
